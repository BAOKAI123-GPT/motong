name: build-win

# 在 Windows runner 上构建墨童 Windows 版（NSIS 安装包 + 便携版），发布到 Release。
# 安装包不再内置 LibreOffice（瘦身）：文档转换引擎改为装完 App 后在「资源库」里按需下载。
# 手动触发：Actions 页面 "Run workflow"。
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Build renderer/main
        run: npx electron-vite build

      - name: Package + publish Windows (NSIS + portable)
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
